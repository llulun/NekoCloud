{% extends "layout.html" %}

{% block title %}使用规则 - {{ config.get('site_title') }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card glass-card border-0 mb-4">
            <div class="card-body p-5">
                <div class="d-flex align-items-center mb-4 border-bottom pb-3">
                    <i class="fas fa-book-reader fa-2x text-primary me-3"></i>
                    <h2 class="card-title fw-bold mb-0">使用规则与合规守则</h2>
                </div>
                
                <div class="content">
                    {{ config.get('rules_text') | safe }}
                </div>
                
                <div class="mt-5 text-center">
                    <form method="POST" action="{{ url_for('agree_rules') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn btn-primary px-5 py-3 rounded-pill shadow-lg">
                            <i class="fas fa-check-circle me-2"></i>我已阅读并同意服务条款
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
